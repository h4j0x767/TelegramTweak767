name: Build Telegram 767 MOD Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install ldid dpkg

    - name: Install Theos
      run: |
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        
        # Download iOS 16.5 SDK
        curl -LO https://github.com/theos/sdks/releases/download/iPhoneOS16.5/iPhoneOS16.5.sdk.tar.xz
        tar -xf iPhoneOS16.5.sdk.tar.xz -C $THEOS/sdks/
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Build Tweak
      run: |
        export THEOS=$HOME/theos
        make package FINALPACKAGE=1 ARCHS=arm64 TARGET="iphone:clang:16.5:14.0"

    - name: Find built files
      run: |
        echo "=== Looking for dylib ==="
        find . -name "*.dylib" 2>/dev/null || true
        find . -name "*.deb" 2>/dev/null || true
        find $HOME/theos -name "TelegramTweak767*" 2>/dev/null || true
        ls -la .theos/obj/ 2>/dev/null || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TelegramTweak767
        path: |
          packages/*.deb
          .theos/**/*.dylib
        if-no-files-found: warn
