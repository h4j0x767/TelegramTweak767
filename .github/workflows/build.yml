name: Build Telegram 767 MOD Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Theos
      uses: theos/setup-theos@v1
      with:
        arch: arm64

    - name: Build Tweak
      run: |
        export THEOS_DEVICE_IP=localhost
        make package FINALPACKAGE=1
      env:
        THEOS: ${{ github.workspace }}/theos

    - name: Upload .deb package
      uses: actions/upload-artifact@v4
      with:
        name: TelegramTweak-DEB
        path: packages/*.deb

    - name: Upload .dylib file
      uses: actions/upload-artifact@v4
      with:
        name: TelegramTweak-DYLIB
        path: .theos/obj/debug/*.dylib
        if-no-files-found: warn
