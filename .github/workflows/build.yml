name: Build Telegram 767 MOD Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: brew install ldid dpkg

    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version)
        rm -rf ~/theos/sdks/iPhoneOS${SDK_VER}.sdk
        ln -sf "$SDK_PATH" ~/theos/sdks/iPhoneOS${SDK_VER}.sdk
        echo "SDK: $(ls ~/theos/sdks/)"

    - name: Build
      run: |
        SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version)
        make package FINALPACKAGE=1 ARCHS=arm64 TARGET="iphone:clang:${SDK_VER}:14.0"
      env:
        THEOS: /Users/runner/theos

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TelegramTweak767
        path: packages/*.deb
        if-no-files-found: warn
