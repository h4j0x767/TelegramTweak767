name: Build Telegram 767 MOD Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Theos with Official Action
      uses: theos/theos-action@main
      with:
        toolchain-cache: true
        theos-cache: true
        xcode-path: /Applications/Xcode.app

    - name: Build Tweak
      run: |
        make package FINALPACKAGE=1 ARCHS=arm64

    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: TelegramTweak767-deb
        path: packages/
        if-no-files-found: warn
