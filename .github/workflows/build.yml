name: Build Telegram 767 MOD Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: brew install ldid dpkg

    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        SDKPATH=$(xcrun --sdk iphoneos --show-sdk-path)
        SDKNAME=$(basename $SDKPATH)
        ln -sf "$SDKPATH" ~/theos/sdks/$SDKNAME
        echo "Using SDK: $SDKNAME at $SDKPATH"

    - name: Build
      run: |
        SDK=$(basename $(xcrun --sdk iphoneos --show-sdk-path))
        make package FINALPACKAGE=1 ARCHS=arm64 TARGET="iphone:clang:$SDK:"
      env:
        THEOS: /Users/runner/theos

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TelegramTweak767
        path: packages/*.deb
        if-no-files-found: warn
