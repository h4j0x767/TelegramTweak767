name: Build Telegram 767 MOD Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: brew install ldid dpkg

    - name: Setup Theos Manually
      run: |
        # 1. Clone Theos to home directory to avoid permission issues
        git clone --recursive https://github.com/theos/theos.git ~/theos
        
        # 2. Automatically find and link the iOS SDK from the Mac runner
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        SDK_NAME=$(basename $SDK_PATH)
        mkdir -p ~/theos/sdks
        ln -sf "$SDK_PATH" ~/theos/sdks/$SDK_NAME
        
        # 3. Save THEOS path for the next steps
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "Using SDK: $SDK_NAME"

    - name: Build Package
      run: |
        # Use the SDK found in the previous step
        export SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version)
        make package FINALPACKAGE=1 ARCHS=arm64 TARGET="iphone:clang:${SDK_VER}:14.0"
      env:
        THEOS: /Users/runner/theos

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Telegram-767-MOD-Package
        path: packages/*.deb
        if-no-files-found: warn
