name: Build Telegram 767 MOD Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Theos
      uses: actions/cache@v4
      id: cache-theos
      with:
        path: theos/
        key: theos-${{ runner.os }}

    - name: Install Theos (if not cached)
      if: steps.cache-theos.outputs.cache-hit != 'true'
      run: |
        brew install ldid dpkg xz
        git clone --recursive https://github.com/theos/theos.git $THEOS
        curl -LO https://github.com/theos/sdks/releases/download/iPhoneOS16.5/iPhoneOS16.5.sdk.tar.xz
        tar -xf iPhoneOS16.5.sdk.tar.xz -C $THEOS/sdks/

    - name: Build Tweak
      run: |
        make package FINALPACKAGE=1 ARCHS=arm64 TARGET="iphone:clang:16.5:14.0"

    - name: List output files
      run: |
        find . -name "*.dylib" -o -name "*.deb" | head -20
        ls packages/ 2>/dev/null || echo "packages dir empty"

    - name: Upload .deb package
      uses: actions/upload-artifact@v4
      with:
        name: TelegramTweak767-package
        path: packages/*.deb
        if-no-files-found: warn

    - name: Upload dylib
      uses: actions/upload-artifact@v4
      with:
        name: TelegramTweak767-dylib
        path: .theos/**/*.dylib
        if-no-files-found: warn
