name: Inject Hack into IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct download URL for IPA'
        required: true
        default: 'https://files.catbox.moe/cb4n9b.ipa'

jobs:
  inject:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install ldid dpkg

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
        mkdir -p ~/theos/sdks
        tar -xJf sdk.tar.xz -C ~/theos/sdks
        rm sdk.tar.xz

    - name: Build dylib
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1 ARCHS=arm64 TARGET="iphone:clang:14.5:14.0"

    - name: Extract dylib from deb
      run: |
        DEB=$(ls packages/com.767.supergoalhack_*.deb | head -1)
        dpkg-deb -x "$DEB" deb_extracted/
        cp deb_extracted/Library/MobileSubstrate/DynamicLibraries/SuperGoalTweak.dylib ./SuperGoalTweak.dylib

    - name: Download original IPA
      run: |
        curl -L "${{ github.event.inputs.ipa_url }}" -o original.zip
        unzip -q original.zip -d ipa_work

    - name: Inject dylib into IPA
      run: |
        # دۆزینەڤەیا فۆڵدەرا یاریێ ب شێوەیەکێ پیشەیی
        APP_PATH=$(find ipa_work/Payload -name "*.app" -type d | head -n 1)
        # سڕینەڤەیا هەر نیشانەکا زێدە وەک (:) یان (/)
        APP_PATH=$(echo "$APP_PATH" | sed 's/[:/]*$//')
        echo "Found App: $APP_PATH"
        
        mkdir -p "$APP_PATH/Frameworks"
        cp SuperGoalTweak.dylib "$APP_PATH/Frameworks/SuperGoalTweak.dylib"
        
        BINARY_NAME=$(basename "$APP_PATH" .app)
        BINARY="$APP_PATH/$BINARY_NAME"
        echo "Target Binary: $BINARY"
        
        # بەکارئینانا پایتۆن بۆ لێدانا هاکێ د ناڤ یاریێ دا
        python3 -c "
        import struct, os
        binary = '$BINARY'
        dylib = b'@executable_path/Frameworks/SuperGoalTweak.dylib\x00'
        with open(binary, 'r+b') as f:
            data = bytearray(f.read())
        def patch(data, off):
            magic = struct.unpack_from('<I', data, off)[0]
            if magic == 0xFEEDFACF:
                ncmds, sizeofcmds = struct.unpack_from('<II', data, off+16)
                hdr = 32
            else: return
            cmdsize = (24 + len(dylib) + 7) & ~7
            cmd = struct.pack('<IIIIII', 0xC, cmdsize, 24, 2, 0x10000, 0x10000) + dylib
            cmd += b'\x00' * (cmdsize - len(cmd))
            ins = off + hdr + sizeofcmds
            data[ins:ins] = cmd
            struct.pack_into('<I', data, offset=off+16, value=ncmds+1)
            struct.pack_into('<I', data, offset=off+20, value=sizeofcmds+cmdsize)
        magic = struct.unpack_from('<I', data, 0)[0]
        if magic == 0xBEBAFECA:
            nfat = struct.unpack_from('>I', data, 4)[0]
            for i in range(nfat):
                patch(data, struct.unpack_from('>I', data, 8+i*20)[0])
        else: patch(data, 0)
        with open(binary, 'wb') as f: f.write(data)
        "
        
        # ئیمزاکرنا فایلان (Signing)
        ldid -S "$APP_PATH/Frameworks/SuperGoalTweak.dylib"
        ldid -S "$BINARY"
        
        # کۆمکرنەڤەیا یاریێ (Repack)
        cd ipa_work
        zip -qr ../SuperGoal_HACKED_767.ipa Payload/
        cd ..

    - name: Upload Hacked IPA
      uses: actions/upload-artifact@v4
      with:
        name: SuperGoal_HACKED_767
        path: SuperGoal_HACKED_767.ipa
