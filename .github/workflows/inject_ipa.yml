name: Inject Hack into IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct download URL for IPA'
        required: true
        default: 'https://github.com/h4j0x767/TelegramTweak767/releases/download/v1.0/SuperGoal.ipa'

jobs:
  inject:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install ldid dpkg

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
        mkdir -p ~/theos/sdks
        tar -xJf sdk.tar.xz -C ~/theos/sdks
        rm sdk.tar.xz

    - name: Build dylib
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1 ARCHS=arm64 TARGET="iphone:clang:14.5:14.0"

    - name: Extract dylib from deb
      run: |
        DEB=$(ls packages/com.767.supergoalhack_*.deb | head -1)
        echo "Found deb: $DEB"
        dpkg-deb -x "$DEB" deb_extracted/
        ls -la deb_extracted/Library/MobileSubstrate/DynamicLibraries/
        cp deb_extracted/Library/MobileSubstrate/DynamicLibraries/SuperGoalTweak.dylib ./SuperGoalTweak.dylib

    - name: Download original IPA
      run: |
        curl -L "${{ github.event.inputs.ipa_url }}" -o original.ipa
        ls -lh original.ipa

    - name: Inject dylib into IPA
      run: |
        # Extract IPA
        unzip -q original.ipa -d ipa_work
        
        # Find app
        APP=$(ls ipa_work/Payload/*.app -d | head -1)
        echo "App: $APP"
        
        # Create Frameworks dir
        mkdir -p "$APP/Frameworks"
        
        # Copy dylib
        cp SuperGoalTweak.dylib "$APP/Frameworks/SuperGoalTweak.dylib"
        
        # Find binary
        BINARY_NAME=$(basename "$APP" .app)
        BINARY="$APP/$BINARY_NAME"
        echo "Binary: $BINARY"
        file "$BINARY"
        
        # Install insert_dylib
        brew install insert_dylib 2>/dev/null || true
        
        # Try insert_dylib
        if command -v insert_dylib &> /dev/null; then
          insert_dylib --strip-codesig --inplace \
            '@executable_path/Frameworks/SuperGoalTweak.dylib' \
            "$BINARY"
        else
          # Manual injection using Python
          python3 -c "
        import struct, sys

        binary_path = '$BINARY'
        dylib_path = b'@executable_path/Frameworks/SuperGoalTweak.dylib\x00'

        with open(binary_path, 'r+b') as f:
            data = bytearray(f.read())

        LC_LOAD_DYLIB = 0x0000000C

        def patch(data, offset):
            magic = struct.unpack_from('<I', data, offset)[0]
            if magic == 0xFEEDFACF:
                ncmds = struct.unpack_from('<I', data, offset+16)[0]
                sizeofcmds = struct.unpack_from('<I', data, offset+20)[0]
                hdr = 32
            else:
                return
            path_off = 24
            cmdsize = (path_off + len(dylib_path) + 7) & ~7
            cmd = struct.pack('<IIIIII', LC_LOAD_DYLIB, cmdsize, path_off, 2, 0x10000, 0x10000)
            cmd += dylib_path
            cmd += b'\x00' * (cmdsize - len(cmd))
            ins = offset + hdr + sizeofcmds
            data[ins:ins] = cmd
            struct.pack_into('<I', data, offset+16, ncmds+1)
            struct.pack_into('<I', data, offset+20, sizeofcmds+cmdsize)
            print(f'Patched at {offset}')

        magic = struct.unpack_from('<I', data, 0)[0]
        if magic == 0xBEBAFECA:
            nfat = struct.unpack_from('>I', data, 4)[0]
            for i in range(nfat):
                off = struct.unpack_from('>I', data, 8+i*20)[0]
                print(f'Fat arch {i} at {off}')
                patch(data, off)
        else:
            patch(data, 0)

        with open(binary_path, 'wb') as f:
            f.write(data)
        print('Done')
        "
        fi
        
        # Re-sign with ldid
        ldid -S "$APP/Frameworks/SuperGoalTweak.dylib"
        ldid -S "$BINARY"
        
        # Repack IPA
        cd ipa_work
        zip -qr ../SuperGoal_HACKED_767.ipa Payload/
        cd ..
        ls -lh SuperGoal_HACKED_767.ipa

    - name: Upload Hacked IPA
      uses: actions/upload-artifact@v4
      with:
        name: SuperGoal_HACKED_767
        path: SuperGoal_HACKED_767.ipa
