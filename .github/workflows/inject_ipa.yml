name: Inject Hack into IPA (Anti-Crash Version)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct download URL for IPA'
        required: true
        default: 'https://files.catbox.moe/cb4n9b.ipa'

jobs:
  inject:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install ldid dpkg
        # Use a more reliable tap or build from source
        brew install tylinux/tap/insert-dylib || (git clone https://github.com/Tyilo/insert_dylib.git && cd insert_dylib && xcodebuild && sudo cp build/Release/insert_dylib /usr/local/bin/)

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
        mkdir -p ~/theos/sdks
        tar -xJf sdk.tar.xz -C ~/theos/sdks
        rm sdk.tar.xz

    - name: Build dylib
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1 ARCHS=arm64 TARGET="iphone:clang:14.5:14.0"

    - name: Prepare Frameworks
      run: |
        # Download portable CydiaSubstrate
        curl -L "https://github.com/Diatrus/CydiaSubstrate-No-Install/raw/master/CydiaSubstrate.framework.zip" -o substrate.zip
        unzip -q substrate.zip
        # Found deb and extract dylib
        DEB=$(ls packages/com.767.supergoalhack_*.deb | head -1)
        dpkg-deb -x "$DEB" deb_extracted/
        cp deb_extracted/Library/MobileSubstrate/DynamicLibraries/SuperGoalTweak.dylib ./SuperGoalTweak.dylib
        
        # Change Tweak dependency on substrate to be relative
        install_name_tool -change "/usr/lib/libsubstrate.dylib" "@executable_path/Frameworks/CydiaSubstrate.framework/CydiaSubstrate" SuperGoalTweak.dylib || true
        install_name_tool -change "/Library/Frameworks/CydiaSubstrate.framework/CydiaSubstrate" "@executable_path/Frameworks/CydiaSubstrate.framework/CydiaSubstrate" SuperGoalTweak.dylib || true

    - name: Download and Inject
      run: |
        curl -L "${{ github.event.inputs.ipa_url }}" -o original.zip
        unzip -q original.zip -d ipa_work
        APP_PATH=$(find ipa_work/Payload -name "*.app" -type d | head -n 1 | sed 's/[:/]*$//')
        mkdir -p "$APP_PATH/Frameworks"
        
        # Copy Hacked files
        cp -r CydiaSubstrate.framework "$APP_PATH/Frameworks/"
        cp SuperGoalTweak.dylib "$APP_PATH/Frameworks/"
        
        # Patch Binary
        BINARY_NAME=$(basename "$APP_PATH" .app)
        BINARY="$APP_PATH/$BINARY_NAME"
        
        # Use insert_dylib (checking both possible names)
        INSERT_DYLIB=$(which insert_dylib || which insert-dylib)
        "$INSERT_DYLIB" --strip-codesig --inplace "@executable_path/Frameworks/SuperGoalTweak.dylib" "$BINARY"
        
        # Sign everything
        ldid -S "$APP_PATH/Frameworks/CydiaSubstrate.framework/CydiaSubstrate"
        ldid -S "$APP_PATH/Frameworks/SuperGoalTweak.dylib"
        ldid -S "$BINARY"
        
        # Repack
        cd ipa_work
        zip -qr ../SuperGoal_FIXED_HACK.ipa Payload/
        cd ..

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SuperGoal_FIXED_HACK
        path: SuperGoal_FIXED_HACK.ipa
