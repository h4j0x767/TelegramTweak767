name: Inject Hack into IPA (Fixed & No-Crash)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct download URL for IPA'
        required: true
        default: 'https://files.catbox.moe/cb4n9b.ipa'

jobs:
  inject:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install ldid dpkg

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
        mkdir -p ~/theos/sdks
        tar -xJf sdk.tar.xz -C ~/theos/sdks
        rm sdk.tar.xz

    - name: Build dylib
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1 ARCHS=arm64 TARGET="iphone:clang
