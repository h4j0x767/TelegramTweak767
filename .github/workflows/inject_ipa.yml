name: Inject Hack into IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct download URL for IPA'
        required: true
        default: 'https://files.catbox.moe/cb4n9b.ipa'

jobs:
  inject:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install ldid dpkg

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
        mkdir -p ~/theos/sdks
        tar -xJf sdk.tar.xz -C ~/theos/sdks
        rm sdk.tar.xz

    - name: Build dylib
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1 ARCHS=arm64 TARGET="iphone:clang:14.5:14.0"

    - name: Extract dylib from deb
      run: |
        DEB=$(ls packages/com.767.supergoalhack_*.deb | head -1)
        dpkg-deb -x "$DEB" deb_extracted/
        cp deb_extracted/Library/MobileSubstrate/DynamicLibraries/SuperGoalTweak.dylib ./SuperGoalTweak.dylib

    - name: Download original IPA
      run: |
        curl -L "${{ github.event.inputs.ipa_url }}" -o original.zip
        unzip -q original.zip -d ipa_work

    - name: Inject dylib into IPA
      run: |
        # دۆزینەڤەیا فۆڵدەرا یاریێ
        APP_PATH=$(find ipa_work/Payload -name "*.app" -type d | head -n 1)
        APP_PATH=$(echo "$APP_PATH" | sed 's/[:/]*$//')
        echo "Found App: $APP_PATH"
        
        mkdir -p "$APP_PATH/Frameworks"
        cp SuperGoalTweak.dylib "$APP_PATH/Frameworks/SuperGoalTweak.dylib"
        
        BINARY_NAME=$(basename "$APP
